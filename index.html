                     <input type="password" required value={password} onChange={(e) => { setPassword(e.target.value); setAuthError(false); }} className={`w-full p-3.5 rounded-2xl border-2 outline-none text-[12px] font-bold shadow-sm transition-all text-center tracking-widest ${authError ? 'border-red-500 bg-red-50' : ''}`} style={{ backgroundColor: authError ? '' : COLORS.bg, borderColor: authError ? '' : COLORS.cardBorder, color: COLORS.textMain }} placeholder="ใส่รหัสผ่าน" disabled={isVerifyingAuth} />
                     {authError && <p className="text-red-500 text-[9px] text-center font-black">รหัสผ่านไม่ถูกต้อง!</p>}
                     <button type="submit" disabled={isVerifyingAuth} className="w-full h-12 rounded-2xl font-black text-[12px] mt-3 text-white shadow-lg flex items-center justify-center active:scale-95 transition-all disabled:opacity-70" style={{ backgroundColor: COLORS.pinkDeep }}>
                        {isVerifyingAuth ? <IconLoader size={18} className="animate-spin-slow" /> : 'Login'}
                     </button>
                     <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }} className="w-full text-[9px] font-black mt-1 uppercase tracking-widest" style={{ color: COLORS.textSoft }} disabled={isVerifyingAuth}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* ==========================================
                🖼️ MODAL: เปลี่ยนรูปโปรไฟล์
                ========================================== */}
            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/30 backdrop-blur-sm animate-fadeIn">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    if (tempImageUrl) { 
                        let finalUrl = tempImageUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) {
                            finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                        }
                        setProfileImage(finalUrl); 
                        fetchAPI({ action: 'saveProfileImage', imageUrl: finalUrl });
                    } 
                    setShowImageModal(false); 
                    setTempImageUrl(''); 
                }} className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp border-[3px]" style={{ backgroundColor: COLORS.white, borderColor: COLORS.pinkDeep }}>
                   <h3 className="text-[14px] font-black mb-4 text-center" style={{ color: COLORS.pinkDeep }}>เปลี่ยนรูปโปรไฟล์ 🎀</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border-2 outline-none text-[11px] font-bold shadow-sm transition-all text-center focus:border-[#A13C36]" style={{ backgroundColor: COLORS.bg, borderColor: COLORS.cardBorder, color: COLORS.textMain }} placeholder="วางลิงก์รูปภาพ Google Drive ที่นี่..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-[12px] mt-3 text-white shadow-lg active:scale-95 transition-all" style={{ backgroundColor: COLORS.pinkDeep }}>Save Image</button>
                     <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} className="w-full text-[9px] font-black mt-1 uppercase tracking-widest" style={{ color: COLORS.textSoft }}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* ==========================================
                🖼️ MODAL: เปลี่ยนแบนเนอร์ร้าน
                ========================================== */}
            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/30 backdrop-blur-sm animate-fadeIn">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    if (tempBannerUrl) { 
                        let finalUrl = tempBannerUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) {
                            finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                        }
                        setBannerImage(finalUrl); 
                        toggleBannerVisibility(true);
                        fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                    } 
                    setShowBannerModal(false); 
                    setTempBannerUrl(''); 
                }} className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp border-[3px]" style={{ backgroundColor: COLORS.white, borderColor: COLORS.pinkDeep }}>
                   <h3 className="text-[14px] font-black mb-4 text-center" style={{ color: COLORS.pinkDeep }}>เปลี่ยนแบนเนอร์ 🎀</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border-2 outline-none text-[11px] font-bold shadow-sm transition-all text-center focus:border-[#A13C36]" style={{ backgroundColor: COLORS.bg, borderColor: COLORS.cardBorder, color: COLORS.textMain }} placeholder="วางลิงก์รูปภาพ Google Drive..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-[12px] mt-3 text-white shadow-lg active:scale-95 transition-all" style={{ backgroundColor: COLORS.pinkDeep }}>Save Banner</button>
                     <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-black mt-1 uppercase tracking-widest" style={{ color: COLORS.textSoft }}>Close</button>
                   </div>
                </form>
              </div>
            )}

          </div>
          
          {/* CSS Animations */}
          <style>{`
            /* ซ่อนแถบ Scrollbar แต่ยังไถได้ */
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

            /* แอนิเมชันลอยสำหรับไอคอนในการ์ด */
            @keyframes float-icon {
              0%, 100% { transform: translateY(0); }
              50% { transform: translateY(-4px); }
            }
            .animate-float-icon { animation: float-icon 3.5s ease-in-out infinite; }

            /* แอนิเมชันของรูปตกแต่งตอนกำลังทำ */
            @keyframes float-deco {
              0%, 100% { transform: translateY(0) rotate(0deg); }
              50% { transform: translateY(-6px) rotate(6deg); }
            }
            @keyframes float-deco-rev {
              0%, 100% { transform: translateY(0) rotate(0deg); }
              50% { transform: translateY(6px) rotate(-6deg); }
            }
            .animate-float-deco-1 { animation: float-deco 3s ease-in-out infinite; }
            .animate-float-deco-2 { animation: float-deco-rev 3.5s ease-in-out infinite; }
            .animate-float-deco-3 { animation: float-deco 4s ease-in-out infinite; }
            .animate-float-deco-4 { animation: float-deco-rev 4.5s ease-in-out infinite; }

            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

            /* CSS สำหรับหลอดริ้ว (Stripes) */
            @keyframes move-stripes {
              0% { background-position: 0 0; }
              100% { background-position: 20px 0; }
            }
            .progress-stripes {
              background-image: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.2) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0.2) 75%,
                transparent 75%,
                transparent
              );
              background-size: 20px 20px;
              animation: move-stripes 1s linear infinite;
            }

            /* แอนิเมชันป๊อป (ตอนเปลี่ยนรูป 4 สเตป) */
            @keyframes pop-bounce {
              0% { transform: scale(0.8); opacity: 0.5; }
              50% { transform: scale(1.1); opacity: 1; }
              100% { transform: scale(1); opacity: 1; }
            }
            .animate-pop { animation: pop-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
